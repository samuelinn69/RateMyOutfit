name: ratemyoutfit-backend
services:
  - name: api
    type: web
    git:
      branch: master
      workdir: backend
    dockerfile:
      dockerfile: Dockerfile
    instance_types:
      - type: eco-nano
    regions:
      - was
    ports:
      - port: 4000
        protocol: http
    env:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      # Set these in the Koyeb dashboard — never commit real secrets
      # - key: DATABASE_URL
      # - key: JWT_SECRET
      # - key: JWT_REFRESH_SECRET
      # - key: OPENAI_API_KEY
      # - key: CLOUDINARY_CLOUD_NAME
      # - key: CLOUDINARY_API_KEY
      # - key: CLOUDINARY_API_SECRET
      # - key: FRONTEND_URL
    health_checks:
      - grace_period: 60
        interval: 10
        restart_limit: 3
        path: /health
        port: 4000
        protocol: http
        timeout: 5
