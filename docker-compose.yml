version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rmo-postgres
    environment:
      POSTGRES_USER: rmo
      POSTGRES_PASSWORD: rmopassword
      POSTGRES_DB: ratemyoutfit
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rmo -d ratemyoutfit']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rmo-backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://rmo:rmopassword@postgres:5432/ratemyoutfit
      NODE_ENV: production
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rmo-frontend
    env_file: ./frontend/.env
    environment:
      NEXT_PUBLIC_API_URL: http://backend:4000
    ports:
      - '3000:3000'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
