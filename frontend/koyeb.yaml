name: ratemyoutfit-frontend
services:
  - name: web
    type: web
    git:
      branch: master
      workdir: frontend
    dockerfile:
      dockerfile: Dockerfile
    instance_types:
      - type: eco-nano
    regions:
      - was
    ports:
      - port: 3000
        protocol: http
    env:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # Set this in the Koyeb dashboard after the backend is deployed
      # - key: NEXT_PUBLIC_API_URL   (your backend Koyeb URL)
    health_checks:
      - grace_period: 60
        interval: 10
        restart_limit: 3
        path: /
        port: 3000
        protocol: http
        timeout: 5
